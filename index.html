<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>JNCT Mock Test - Final Ultimate v12</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI', Roboto, sans-serif;}
  html,body{height:100%;background:#f4f7fe; color: #1e293b;}
  :root{
    --accent:#4f46e5;
    --success:#10b981;
    --danger:#ef4444;
    --navy:#0f172a;
    --card:#ffffff;
  }
  .container{max-width:1100px;margin:20px auto;padding:20px;}
  header{display:flex;flex-direction:column;align-items:center;margin-bottom:25px;}
  h1{font-size:2.2rem;color:var(--navy);font-weight:800;}
  .logo{width:120px;height:120px;margin:15px;background:#fff;border-radius:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 25px rgba(0,0,0,0.05);}
  .card{background:var(--card);border-radius:20px;padding:25px;box-shadow:0 10px 30px rgba(0,0,0,0.04);margin-bottom:20px;}
  
  .btn{padding:12px 18px;border-radius:10px;border:0;font-weight:700;cursor:pointer;transition:0.2s;display:inline-flex;align-items:center;gap:8px;font-size:0.9rem;}
  .btn-primary{background:var(--accent);color:white;}
  .btn-secondary{background:var(--success);color:white;}
  .btn-ghost{background:#f1f5f9;color:var(--navy);}
  .btn-danger{background:#fee2e2;color:var(--danger);}

  .teacher-form{display:flex;flex-direction:column;gap:20px;max-height:60vh;overflow-y:auto;padding:10px;background:#f8fafc;border-radius:15px;border:1px solid #e2e8f0;}
  .qbox{background:white;padding:20px;border-radius:15px;border:1px solid #e2e8f0;box-shadow:0 4px 6px rgba(0,0,0,0.02); margin-bottom:10px;}
  textarea, input[type="text"], input[type="number"], select{width:100%;padding:12px;border-radius:10px;border:1px solid #cbd5e1;margin-top:5px;outline:none;background:white;}
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
  .opt-row{display:flex;align-items:center;gap:10px;background:#f1f5f9;padding:8px;border-radius:8px;}

  .timer{font-size:1.2rem;font-weight:800;color:var(--accent);background:white;padding:10px 20px;border-radius:12px;border:2px solid var(--accent);}
  .opt-choice{padding:15px;border:2px solid #e2e8f0;border-radius:12px;margin-bottom:10px;cursor:pointer;transition:0.2s;display:flex;align-items:center;gap:10px;}
  .opt-choice.selected{border-color:var(--accent);background:#eef2ff;}

  .qnav{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0;}
  .qnav-btn{width:40px;height:40px;border-radius:10px;border:1px solid #cbd5e1;background:white;font-weight:700;cursor:pointer;}
  .qnav-btn.active{background:var(--navy);color:white;}
  .qnav-btn.done{background:var(--success);color:white;border-color:var(--success);}

  .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.85);display:flex;align-items:center;justify-content:center;z-index:1000;padding:15px;}
  .modal-content{background:white;padding:30px;border-radius:20px;width:100%;max-width:850px;max-height:90vh;overflow-y:auto;position:relative;}

  .bank-folder { background:#f1f5f9; border-radius:12px; margin-bottom:10px; overflow:hidden; border:1px solid #e2e8f0; }
  .folder-header { padding:15px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; background:#fff; transition: 0.2s; }
  .folder-header:hover { background:#f8fafc; }
  .folder-content { display:none; padding:10px; background:#f1f5f9; border-top:1px solid #e2e8f0; }
  
  #print-iframe { position: absolute; width: 0; height: 0; border: none; visibility: hidden; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo"><img id="main-logo" src="" alt="JNCT" style="max-width:90%"></div>
    <h1>JNCT COLLEGE REWA</h1>
    <p style="color:var(--muted)">Mock Test Website — Advanced Control</p>
  </header>

  <div class="card" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">
    <div>
      <h2 id="display-subject">Mock Test</h2>
      <p>Manage your questions and take interactive tests.</p>
    </div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-primary" onclick="checkTeacherAccess()">Teacher's Panel</button>
      <button class="btn btn-secondary" onclick="startStudentFlow()">Students</button>
    </div>
  </div>
</div>

<div id="modal-root"></div>

<template id="teacher-tpl">
  <div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
      <h3>Teacher Dashboard</h3>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="openBank()">Saved Questions</button>
        <button class="btn btn-ghost" onclick="openCustomizer()">UI Settings</button>
        <button class="btn btn-ghost" onclick="changePass()">Change Password</button>
        <button class="btn btn-primary" onclick="generateAndPrintPDF()">Download PDF</button>
        <button class="btn btn-secondary" onclick="saveAllToStorage()">Save All</button>
        <button class="btn btn-danger" onclick="closeModal()">Exit</button>
      </div>
    </div>

    <div style="background:#eef2ff; padding:15px; border-radius:12px; margin-bottom:15px; display:flex; align-items:center; gap:15px; border:1px solid #c7d2fe;">
      <strong>Test Timer (Minutes):</strong>
      <input type="number" id="input-timer" style="width:100px; margin:0;" min="1">
    </div>

    <div class="teacher-form" id="form-container"></div>
    <button class="btn btn-ghost" style="width:100%; margin-top:15px; border:2px dashed #cbd5e1;" onclick="addNewQ()">+ Add New Question</button>
  </div>
</template>

<script>
let testState = {
    questions: [{q: "Sample Question?", opts: ["Option A","Option B","Option C","Option D"], correct: 0}],
    bank: { "General": [] },
    settings: { subject: "Mock Test", logo: "", password: "123", duration: 10 },
    studentAnswers: [],
    currentIdx: 0
};

function loadAll() {
    const q = localStorage.getItem('jnct_v12_q');
    const s = localStorage.getItem('jnct_v12_s');
    const b = localStorage.getItem('jnct_v12_b');
    if(q) testState.questions = JSON.parse(q);
    if(s) testState.settings = JSON.parse(s);
    if(b) testState.bank = JSON.parse(b);
    document.getElementById('display-subject').innerText = testState.settings.subject;
    if(testState.settings.logo) document.getElementById('main-logo').src = testState.settings.logo;
}

function saveAllToStorage() {
    localStorage.setItem('jnct_v12_q', JSON.stringify(testState.questions));
    localStorage.setItem('jnct_v12_s', JSON.stringify(testState.settings));
    localStorage.setItem('jnct_v12_b', JSON.stringify(testState.bank));
    alert("Project Data Saved!");
}

function openModal(content) {
    const root = document.getElementById('modal-root');
    root.innerHTML = `<div class="modal-overlay"><div class="modal-content" id="modal-body"></div></div>`;
    document.getElementById('modal-body').appendChild(content);
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

function checkTeacherAccess() {
    const p = prompt("Enter Teacher Password:");
    if(p === testState.settings.password) openTeacherPanel();
    else if(p !== null) alert("Wrong Password!");
}

function openTeacherPanel() {
    const tpl = document.getElementById('teacher-tpl').content.cloneNode(true);
    const container = tpl.getElementById('form-container');
    tpl.getElementById('input-timer').value = testState.settings.duration;
    tpl.getElementById('input-timer').onchange = (e) => testState.settings.duration = parseInt(e.target.value);

    const render = () => {
        container.innerHTML = '';
        testState.questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'qbox';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <strong>Question ${i+1}</strong>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-ghost" style="padding:5px 10px;" onclick="saveToBankUI(${i})">Save</button>
                        <button class="btn btn-danger" style="padding:5px 10px;" onclick="deleteQ(${i})">Remove</button>
                    </div>
                </div>
                <textarea oninput="testState.questions[${i}].q = this.value">${q.q}</textarea>
                <div class="options-grid">
                    ${q.opts.map((opt, oi) => `
                        <div class="opt-row">
                            <input type="radio" name="correct-${i}" ${q.correct === oi ? 'checked' : ''} onchange="testState.questions[${i}].correct = ${oi}">
                            <input type="text" value="${opt}" oninput="testState.questions[${i}].opts[${oi}] = this.value">
                        </div>
                    `).join('')}
                </div>`;
            container.appendChild(div);
        });
    };
    window.addNewQ = () => { testState.questions.push({q: "", opts: ["","","",""], correct: 0}); render(); };
    window.deleteQ = (i) => { testState.questions.splice(i,1); render(); };
    render();
    openModal(tpl);
}

/* UPDATED SMART SAVE WITH TRUE SELECT DROPDOWN */
function saveToBankUI(questionIndex) {
    const folders = Object.keys(testState.bank).sort();
    const saveDiv = document.createElement('div');
    
    saveDiv.innerHTML = `
        <h3>Save Question to Bank</h3>
        <p style="font-size:0.9rem; margin:15px 0 5px 0;">Select Folder:</p>
        <select id="folder-dropdown-select">
            <option value="" disabled selected>-- Choose Folder --</option>
            ${folders.map(f => `<option value="${f}">${f}</option>`).join('')}
            <option value="NEW_FOLDER" style="color:var(--accent); font-weight:bold;">+ Create New Folder</option>
        </select>
        
        <div id="new-folder-input-area" style="display:none; margin-top:15px;">
            <p style="font-size:0.9rem; margin-bottom:5px;">New Folder Name:</p>
            <input type="text" id="new-folder-name-input" placeholder="Enter name...">
        </div>
        
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:25px;">
            <button class="btn btn-ghost" onclick="openTeacherPanel()">Cancel</button>
            <button class="btn btn-primary" id="confirm-save-btn">Save Question</button>
        </div>
    `;
    
    openModal(saveDiv);
    
    const dropdown = document.getElementById('folder-dropdown-select');
    const newFolderArea = document.getElementById('new-folder-input-area');
    
    dropdown.onchange = () => {
        newFolderArea.style.display = (dropdown.value === "NEW_FOLDER") ? "block" : "none";
    };
    
    document.getElementById('confirm-save-btn').onclick = () => {
        let finalFolder = "";
        
        if (dropdown.value === "NEW_FOLDER") {
            finalFolder = document.getElementById('new-folder-name-input').value.trim();
        } else {
            finalFolder = dropdown.value;
        }
        
        if(!finalFolder) {
            alert("Please select or enter a folder name!");
            return;
        }
        
        if(!testState.bank[finalFolder]) {
            testState.bank[finalFolder] = [];
        }
        
        testState.bank[finalFolder].push(JSON.parse(JSON.stringify(testState.questions[questionIndex])));
        saveAllToStorage();
        openTeacherPanel();
    };
}

function generateAndPrintPDF() {
    let iframe = document.getElementById('print-iframe');
    if (!iframe) {
        iframe = document.createElement('iframe');
        iframe.id = 'print-iframe';
        document.body.appendChild(iframe);
    }
    let pdfHTML = `<html><head><style>body { font-family: sans-serif; padding: 40px; color: black; } h1 { text-align: center; } .header-line { text-align: center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 30px; } .q-block { margin-bottom: 25px; page-break-inside: avoid; } .correct { color: #16a34a; font-weight: bold; }</style></head><body><h1>${testState.settings.subject}</h1><div class="header-line">Official Question Paper</div>`;
    testState.questions.forEach((q, i) => {
        pdfHTML += `<div class="q-block"><div><strong>Q${i+1}. ${q.q}</strong></div>${q.opts.map((o, oi) => `<div style="margin:5px 0 0 20px;" class="${q.correct === oi ? 'correct' : ''}">${String.fromCharCode(65+oi)}. ${o} ${q.correct === oi ? '(Correct)' : ''}</div>`).join('')}</div>`;
    });
    pdfHTML += `</body></html>`;
    const doc = iframe.contentWindow.document;
    doc.open(); doc.write(pdfHTML); doc.close();
    setTimeout(() => { iframe.contentWindow.focus(); iframe.contentWindow.print(); }, 500);
}

function openBank() {
    const div = document.createElement('div');
    div.innerHTML = `<h3>Saved Questions</h3><div id="bank-list" style="margin:20px 0;"></div>
    <button class="btn btn-primary" onclick="addFolder()">+ Create New Folder</button>
    <button class="btn btn-ghost" onclick="openTeacherPanel()" style="width:100%; margin-top:10px;">Back</button>`;
    
    const refresh = () => {
        const list = div.querySelector('#bank-list');
        list.innerHTML = '';
        Object.keys(testState.bank).sort().forEach(f => {
            const folderDiv = document.createElement('div');
            folderDiv.className = 'bank-folder';
            folderDiv.innerHTML = `
                <div class="folder-header">
                    <span onclick="toggleFolder(this)" style="flex:1; font-weight:bold;">📁 ${f} (${testState.bank[f].length})</span>
                    <div style="display:flex; gap:10px;">
                        <button onclick="renameFolder('${f}')" style="background:none; border:0; cursor:pointer;" title="Rename">✏️</button>
                        <button onclick="delFolder('${f}')" style="background:none; border:0; cursor:pointer;" title="Delete">🗑️</button>
                    </div>
                </div>
                <div class="folder-content">
                    ${testState.bank[f].map((q, qi) => `
                        <div style="background:#fff; padding:8px; border-radius:8px; margin-bottom:5px; font-size:0.85rem; display:flex; justify-content:space-between; align-items:center; border:1px solid #e2e8f0;">
                            <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${q.q || 'Untitled Question'}</span>
                            <div style="display:flex; gap:5px; margin-left:10px;">
                                <button class="btn btn-danger" style="padding:4px 8px; font-size:0.7rem;" onclick="removeBankQ('${f}', ${qi})">Remove</button>
                                <button class="btn btn-secondary" style="padding:4px 8px; font-size:0.7rem;" onclick="useQ('${f}', ${qi})">Add</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            list.appendChild(folderDiv);
        });
    };

    window.toggleFolder = (el) => {
        const content = el.parentElement.nextElementSibling;
        content.style.display = content.style.display === 'block' ? 'none' : 'block';
    };

    window.addFolder = () => { const n = prompt("Folder Name:"); if(n) { testState.bank[n] = []; refresh(); saveAllToStorage(); }};
    window.renameFolder = (oldName) => {
        const newName = prompt("Rename Folder to:", oldName);
        if(newName && newName !== oldName) {
            testState.bank[newName] = testState.bank[oldName];
            delete testState.bank[oldName];
            saveAllToStorage();
            refresh();
        }
    };
    window.delFolder = (f) => { if(confirm(`Delete folder "${f}"?`)) { delete testState.bank[f]; saveAllToStorage(); refresh(); }};
    window.useQ = (f, qi) => { testState.questions.push(JSON.parse(JSON.stringify(testState.bank[f][qi]))); alert("Question added to main test!"); };
    window.removeBankQ = (f, qi) => { 
        if(confirm("Remove this question from bank?")) {
            testState.bank[f].splice(qi, 1); 
            saveAllToStorage(); refresh();
            const folders = document.querySelectorAll('.bank-folder');
            folders.forEach(folder => {
                if(folder.querySelector('.folder-header span').innerText.includes(f)) {
                    folder.querySelector('.folder-content').style.display = 'block';
                }
            });
        }
    };
    refresh();
    openModal(div);
}

/* STUDENT FLOW */
function startStudentFlow() {
    if(confirm(`Start Test: ${testState.settings.subject}?\nTimer: ${testState.settings.duration} Mins`)) {
        testState.studentAnswers = Array(testState.questions.length).fill(null);
        testState.currentIdx = 0;
        runTest();
    }
}

function runTest() {
    let timeLeft = testState.settings.duration * 60;
    const div = document.createElement('div');
    div.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3>${testState.settings.subject}</h3>
            <div class="timer" id="test-clock">00:00</div>
        </div>
        <div id="question-area" class="card"></div>
        <div class="qnav" id="test-nav"></div>
        <div style="display:flex; justify-content:space-between; gap:10px;">
            <button class="btn btn-ghost" style="flex:1" onclick="navQ(-1)">Previous</button>
            <button class="btn btn-primary" style="flex:2" onclick="navQ(1)" id="next-submit">Next</button>
        </div>`;
    const clock = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft/60), s = timeLeft % 60;
        const clockEl = document.getElementById('test-clock');
        if(clockEl) clockEl.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if(timeLeft <= 0) { clearInterval(clock); finishTest(); }
    }, 1000);
    window.stopClock = () => clearInterval(clock);
    openModal(div);
    displayQuestion();
}

function displayQuestion() {
    const area = document.getElementById('question-area');
    const q = testState.questions[testState.currentIdx];
    area.innerHTML = `<div style="font-size:1.1rem; font-weight:700; margin-bottom:15px;">Q${testState.currentIdx+1}. ${q.q}</div>`;
    q.opts.forEach((o, i) => {
        const opt = document.createElement('div');
        opt.className = `opt-choice ${testState.studentAnswers[testState.currentIdx] === i ? 'selected' : ''}`;
        opt.innerHTML = `<strong>${String.fromCharCode(65+i)}.</strong> <span>${o}</span>`;
        opt.onclick = () => { testState.studentAnswers[testState.currentIdx] = i; displayQuestion(); updateNav(); };
        area.appendChild(opt);
    });
    document.getElementById('next-submit').innerText = (testState.currentIdx === testState.questions.length - 1) ? "Submit Test" : "Next";
    updateNav();
}

function updateNav() {
    const nav = document.getElementById('test-nav');
    nav.innerHTML = '';
    testState.questions.forEach((_, i) => {
        const b = document.createElement('button');
        b.className = `qnav-btn ${testState.currentIdx === i ? 'active' : ''} ${testState.studentAnswers[i] !== null ? 'done' : ''}`;
        b.innerText = i+1;
        b.onclick = () => { testState.currentIdx = i; displayQuestion(); };
        nav.appendChild(b);
    });
}

window.navQ = (dir) => {
    if(dir === 1 && testState.currentIdx === testState.questions.length - 1) {
        if(confirm("Submit test?")) finishTest();
    } else {
        const next = testState.currentIdx + dir;
        if(next >= 0 && next < testState.questions.length) { testState.currentIdx = next; displayQuestion(); }
    }
};

function finishTest() {
    window.stopClock();
    let score = 0;
    testState.questions.forEach((q, i) => { if(testState.studentAnswers[i] === q.correct) score++; });
    const div = document.createElement('div');
    div.style.textAlign = 'center';
    div.innerHTML = `<h2>Result</h2><div style="font-size:4rem; color:var(--accent); font-weight:800; margin:15px 0;">${score} / ${testState.questions.length}</div>
    <div style="display:flex; gap:10px; justify-content:center;">
        <button class="btn btn-ghost" onclick="verifyRes()">View Result</button>
        <button class="btn btn-primary" onclick="location.reload()">Home</button>
    </div>`;
    openModal(div);
}

function verifyRes() {
    if(prompt("Enter Password:") === testState.settings.password) showFullResult();
    else alert("Wrong Password!");
}

function showFullResult() {
    const div = document.createElement('div');
    div.innerHTML = `<h3>Review Answers</h3><div id="rev-list" style="margin-top:15px;"></div>
    <button class="btn btn-primary" onclick="location.reload()" style="width:100%; margin-top:15px;">Close Review</button>`;
    const list = div.querySelector('#rev-list');
    testState.questions.forEach((q, i) => {
        const u = testState.studentAnswers[i];
        const item = document.createElement('div');
        item.style = `padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid #eee; background:${u===q.correct?'#f0fdf4':'#fff1f2'}`;
        item.innerHTML = `<p><strong>Q${i+1}. ${q.q}</strong></p>`;
        q.opts.forEach((o, oi) => {
            let color = '';
            if(oi === q.correct) color = 'background:#dcfce7; border:1px solid #22c55e; font-weight:700;';
            else if(oi === u) color = 'background:#fee2e2; border:1px solid #ef4444; font-weight:700;';
            item.innerHTML += `<div style="padding:8px; margin-top:5px; border-radius:8px; ${color}">${String.fromCharCode(65+oi)}. ${o}</div>`;
        });
        list.appendChild(item);
    });
    openModal(div);
}

function openCustomizer() {
    const d = document.createElement('div');
    d.innerHTML = `<h3>Settings</h3><label>Subject:</label><input type="text" id="cs" value="${testState.settings.subject}">
    <label style="display:block; margin-top:10px;">Logo:</label><input type="file" id="cl" accept="image/*">
    <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="svUI()">Apply</button>`;
    window.svUI = () => {
        testState.settings.subject = document.getElementById('cs').value;
        const f = document.getElementById('cl').files[0];
        if(f) {
            const r = new FileReader();
            r.onload = (e) => { testState.settings.logo = e.target.result; saveAllToStorage(); location.reload(); };
            r.readAsDataURL(f);
        } else { saveAllToStorage(); location.reload(); }
    };
    openModal(d);
}

window.changePass = () => {
    const n = prompt("New Password:", testState.settings.password);
    if(n) { testState.settings.password = n; saveAllToStorage(); }
};

loadAll();
</script>
</body>
</html>
